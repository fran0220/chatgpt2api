<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT2API - Token 管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Geist Sans', 'sans-serif'] },
        }
      }
    }
  </script>
  <link href="/static/common/css/common.css" rel="stylesheet">
  <link href="/static/admin/css/token.css" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Header -->
  <header class="border-b border-[var(--border)] bg-white">
    <div class="container mx-auto max-w-5xl px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="font-semibold text-sm tracking-tight">ChatGPT2API</span>
        <span class="text-[var(--accents-3)] text-xs">/</span>
        <span class="text-[var(--accents-4)] text-xs">管理后台</span>
      </div>
      <button onclick="logout()" class="geist-button-outline text-xs px-3 gap-1.5">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        退出
      </button>
    </div>
  </header>

  <!-- Settings Section -->
  <div class="container mx-auto max-w-5xl px-6 pt-6">
    <div class="bg-white rounded-lg border border-[var(--border)] p-5">
      <div class="flex items-center justify-between mb-3">
        <div>
          <h3 class="text-sm font-semibold">API 访问密钥</h3>
          <p class="text-xs text-[var(--accents-4)] mt-0.5">配置调用图片生成接口 (<code class="text-xs">/v1/images/generations</code>) 所需的 Bearer Token，留空则无需认证</p>
        </div>
        <div class="flex items-center gap-2">
          <span id="api-key-status" class="text-xs"></span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative flex-1">
          <input type="text" id="api-key-input" class="geist-input font-mono text-xs pr-8" placeholder="留空表示无需认证（支持逗号分隔多个 key）">
          <button onclick="toggleApiKeyVisibility()" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <svg id="api-key-eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <button onclick="saveApiKey()" class="geist-button text-xs px-4">保存</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="space-y-6 flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">Token 列表</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm">管理 ChatGPT2API 的 Token 池</p>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="openImportModal()" class="geist-button-outline gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span>导入</span>
          </button>
          <button onclick="openAddModal()" class="geist-button gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
            <span>添加</span>
          </button>
        </div>
      </div>

      <div class="h-px bg-[var(--border)] my-6"></div>

      <!-- Statistics -->
      <div class="grid grid-cols-4 gap-4 mb-6" id="stats-container">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">Token 总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-green-600" id="stat-active">-</div>
          <div class="stat-label">Token 正常</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-orange-500" id="stat-cooling">-</div>
          <div class="stat-label">Token 限流</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-red-600" id="stat-invalid">-</div>
          <div class="stat-label">Token 失效</div>
        </div>
      </div>

      <!-- Tab Filter -->
      <div class="flex items-center gap-4 mb-4 overflow-x-auto hide-scrollbar"
           role="tablist" id="status-tabs">
        <button class="tab-item active" role="tab" aria-selected="true"
                data-filter="all" onclick="filterByStatus('all')">
          <span>全部</span> <span class="badge" id="tab-count-all">0</span>
        </button>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="active" onclick="filterByStatus('active')">
          <span>正常</span> <span class="badge badge-green" id="tab-count-active">0</span>
        </button>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="cooling" onclick="filterByStatus('cooling')">
          <span>限流</span> <span class="badge badge-orange" id="tab-count-cooling">0</span>
        </button>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="expired" onclick="filterByStatus('expired')">
          <span>失效</span> <span class="badge badge-red" id="tab-count-expired">0</span>
        </button>
      </div>

      <div class="token-table-shell rounded-lg overflow-hidden bg-white mb-4">
        <div class="overflow-x-auto">
          <table class="geist-table min-w-[700px]">
            <thead>
              <tr>
                <th class="w-10"><input type="checkbox" id="select-all" class="checkbox" onclick="toggleSelectAll()"></th>
                <th class="w-56 text-left">Token</th>
                <th class="w-24">状态</th>
                <th class="w-20">调用次数</th>
                <th class="text-left">备注</th>
                <th class="w-20 text-center">操作</th>
              </tr>
            </thead>
            <tbody id="token-table-body">
            </tbody>
          </table>
        </div>
        <div id="loading" class="text-center py-12 text-[var(--accents-4)]">加载中...</div>
        <div id="empty-state" class="hidden table-empty">
          暂无 Token，请点击右上角导入或添加。
        </div>
      </div>
    </div>
  </main>

  <!-- Batch Actions Bar (Floating Bottom) -->
  <div id="batch-actions" style="display:none"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 z-20 rounded-full px-3 py-2 flex items-center gap-3 whitespace-nowrap">
    <div class="text-sm font-medium flex items-center gap-2">
      <span class="text-[var(--accents-5)] text-xs">已选择</span>
      <span class="bg-black text-white text-xs px-1.5 py-0.5 rounded-full" id="selected-count">0</span>
      <span class="text-[var(--accents-5)] text-xs">项</span>
    </div>
    <span class="toolbar-sep"></span>
    <button onclick="batchDelete()" class="geist-button-danger text-xs px-3">删除</button>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h3 class="modal-title">批量导入 Token</h3>
        <button onclick="closeImportModal()" class="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="modal-label mb-1 block">Token 列表 (每行一个)</label>
          <textarea id="import-text" class="geist-input font-mono h-48"
            placeholder="粘贴 Token，一行一个..."></textarea>
        </div>
        <div>
          <label class="modal-label mb-1 block">备注 (可选)</label>
          <input type="text" id="import-note-input" class="geist-input" placeholder="为导入的 Token 添加备注" maxlength="50">
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeImportModal()" class="geist-button-outline text-xs px-3">取消</button>
          <button onclick="submitImport()" class="geist-button text-xs px-3">开始导入</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Modal -->
  <div id="add-modal" class="modal-overlay hidden">
    <div class="modal-content modal-md">
      <div class="modal-header">
        <h3 class="modal-title">添加 Token</h3>
        <button onclick="closeAddModal()" class="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="modal-label mb-1 block">Token</label>
          <input type="text" id="add-token-input" class="geist-input font-mono" placeholder="输入 Token">
        </div>
        <div>
          <label class="modal-label mb-1 block">备注 (可选)</label>
          <input type="text" id="add-note-input" class="geist-input" placeholder="添加备注" maxlength="50">
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeAddModal()" class="geist-button-outline text-xs px-3">取消</button>
          <button onclick="submitAdd()" class="geist-button text-xs px-3">添加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-dialog" class="modal-overlay confirm-dialog hidden">
    <div class="modal-content modal-md">
      <div class="confirm-dialog-body">
        <div class="confirm-dialog-title">请确认</div>
        <div id="confirm-message" class="confirm-dialog-message"></div>
        <div class="confirm-dialog-actions">
          <button onclick="closeConfirm(false)" class="geist-button-outline text-xs px-3">取消</button>
          <button onclick="closeConfirm(true)" class="geist-button-danger text-xs px-3">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/common/js/admin-auth.js"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/admin/js/token.js"></script>
</body>

</html>
